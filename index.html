<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>استمارة الترشيح</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
@page { size: A4; margin:0; }

html,body{
  margin:0;
  padding:0;
  background:#fff;
  font-family:"Traditional Arabic", Arial;
}

/* ورقة A4 */
#sheet{
  width:210mm;
  height:297mm;
  position:relative;
  overflow:hidden;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* الخلفية */
#sheet img{
  position:absolute;
  width:210mm;
  height:297mm;
  inset:0;
  object-fit:cover;
  pointer-events:none;
}

/* الحقول */
.field, .check{
  position:absolute;
  background:transparent;
  border:none;
  outline:none;
  font-size:15px;
  box-sizing:border-box;
}

.field{
  padding:3mm;
}

textarea.field{
  resize:none;
}

/* مربعات اختيار */
.check{
  width:5mm;
  height:5mm;
  accent-color:#000;
}

/* أزرار */
.actions{
  text-align:center;
  margin:15px 0;
}

button{
  padding:10px 20px;
  background:#0b2a57;
  color:#fff;
  border:none;
  cursor:pointer;
}
button:hover{ background:#0f7a3a; }

@media print{
  .actions{ display:none; }
}
</style>
</head>

<body>

<div id="sheet">
<img src="form-bg.png">

<!-- اسم الموظف -->
<input class="field" style="top:84mm; right:20mm; width:170mm; height:12mm;">

<!-- المسمى الوظيفي -->
<input class="field" style="top:100mm; right:20mm; width:170mm; height:12mm;">

<!-- الرقم المدني -->
<input class="field" style="top:116mm; right:20mm; width:82mm; height:12mm;">

<!-- الرقم الوظيفي -->
<input class="field" style="top:116mm; right:108mm; width:82mm; height:12mm;">

<!-- التقسيم التنظيمي -->
<input class="field" style="top:132mm; right:20mm; width:170mm; height:12mm;">

<!-- تاريخ الترشيح -->
<input class="field" type="date" style="top:148mm; right:20mm; width:170mm; height:12mm;">

<!-- موظف الشهر -->
<input class="check" type="checkbox" data-group="path" style="top:167mm; right:116mm;">

<!-- الموظف المبادر -->
<input class="check" type="checkbox" data-group="path" style="top:167mm; right:46mm;">

<!-- نتيجة الأداء -->
<input class="field" style="top:180mm; right:90mm; width:100mm; height:12mm;">

<!-- نعم -->
<input class="check" type="checkbox" data-group="other" style="top:196mm; right:52mm;">

<!-- لا -->
<input class="check" type="checkbox" data-group="other" style="top:196mm; right:96mm;">

<!-- مبررات الترشيح -->
<textarea class="field" style="top:214mm; right:20mm; width:170mm; height:36mm;"></textarea>

<!-- اسم المسؤول المباشر -->
<input class="field" style="top:256mm; right:20mm; width:170mm; height:12mm;">

<!-- موافق -->
<input class="check" type="checkbox" data-group="approve" style="top:274mm; right:96mm;">

<!-- غير موافق -->
<input class="check" type="checkbox" data-group="approve" style="top:274mm; right:52mm;">

<!-- اعتماد المسؤول الأعلى -->
<input class="field" style="top:286mm; right:108mm; width:82mm; height:10mm;">

<!-- الختم -->
<input class="field" style="top:286mm; right:20mm; width:82mm; height:10mm;">

</div>

<div class="actions">
<button onclick="window.print()">طباعة</button>
<button onclick="savePDF()">حفظ PDF</button>
</div>

<script>
// اختيار واحد فقط لكل مجموعة
document.querySelectorAll('.check').forEach(cb=>{
  cb.addEventListener('change', ()=>{
    if(!cb.checked) return;
    const group = cb.dataset.group;
    document.querySelectorAll(`.check[data-group="${group}"]`).forEach(x=>{
      if(x!==cb) x.checked=false;
    });
  });
});

function savePDF(){
  const element=document.getElementById("sheet");
  html2pdf().set({
    margin:0,
    filename:"استمارة_الترشيح.pdf",
    html2canvas:{
      scale:3,
      useCORS:true,
      backgroundColor:"#ffffff"
    },
    jsPDF:{ unit:"mm", format:"a4", orientation:"portrait" },
    pagebreak:{ mode:["avoid-all"] }
  }).from(element).save();
}
</script>

</body>
</html>
